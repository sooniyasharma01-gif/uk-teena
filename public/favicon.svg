<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1f1a"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b882"/>
      <stop offset="50%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#b8965a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)" stroke="#c9a96e" stroke-width="0.5" opacity="0.8"/>
  <circle cx="50" cy="30" r="1.5" fill="#c9a96e" opacity="0.6"/>
  <text x="50" y="72" font-family="Cormorant Garamond, Georgia, serif" font-size="58" font-style="italic" font-weight="500" fill="url(#text)" text-anchor="middle" filter="url(#glow)">T</text>
  <circle cx="50" cy="85" r="1" fill="#c9a96e" opacity="0.4"/>
</svg>
